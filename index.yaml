    appVersion: 2.40.1
    created: "2026-05-13T19:34:18.0003889-03:00"
    description: 'Helm chart for JHipster Online on Red Hat OpenShift (application
      2.40.1) with multi-stack generator support (8 stacks: Spring Boot, Quarkus,
      Micronaut, .NET, Azure ACA, Node/NestJS, Go, Rust). Default single-stack profile
      deploys Quarkus; optional per-stack worker Deployments (CLI backend only) can
      be enabled for dedicated generation pods. Includes generator-jhipster 9.0.0,
      generator-jhipster-quarkus 4.0.0, a JDL Studio sidecar, MariaDB, an OpenShift
      Route, and optional in-cluster deploy RBAC. Runtime images on Quay (tags 2.40.1-quarkus
      / 2.40.1-spring-boot) match upstream Dockerfiles: UBI8 OpenJDK 21, Node 22.19,
      Maven 3.9.15, WAR at /deployments/jhonline.war. JDL AI supports lexical and
      optional semantic RAG plus configurable HTTP timeouts. Default values.yaml targets
      Red Hat Developer Sandbox (Route, edit RBAC, in-cluster deploy, shared-model
      JDL AI URLs). Workers share the same MariaDB and env vars; each uses a stack-specific
      image with the matching JHipster generator pre-installed.'
