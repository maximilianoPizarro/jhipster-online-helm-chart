    created: "2026-05-13T14:12:05.8884573-03:00"
    description: 'Helm chart for JHipster Online on Red Hat OpenShift (application
      2.40.1). Includes generator-jhipster 9.0.0, generator-jhipster-quarkus 3.6.0,
      a JDL Studio sidecar, MariaDB, an OpenShift Route, and optional in-cluster deploy
      RBAC. Runtime images on Quay (tags 2.40.1-quarkus / 2.40.1-spring-boot) match
      upstream Dockerfiles: UBI8 OpenJDK 21, Node 22.19, Maven 3.9.15, WAR at /deployments/jhonline.war;
      the main container uses imagePullPolicy Always. JDL AI supports lexical and
      optional semantic RAG plus configurable HTTP timeouts. Defaults add JAVA_OPTS_APPEND
      (UTF-8 and MaxRAMPercentage for cgroup-friendly heap) and pod CPU/memory requests
      and limits. OpenShift generator templates are bundled in the app (no OPENSHIFT_*
      raw URL env vars). Aligns with upstream application-prod: optional chart-repo
      packaging after generate, and OpenShift deploy via Helm CLI with Fabric8 fallback.
      Default values.yaml targets Red Hat Developer Sandbox (Route, edit RBAC, in-cluster
      deploy, shared-model JDL AI URLs). Helm deploy tuning uses OPENSHIFT_USE_HELM_CLI
      / OPENSHIFT_HELM_* env names per upstream application-prod.yml.'
