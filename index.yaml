    appVersion: 2.41.1
    created: "2026-05-14T13:25:08.3550407-03:00"
    description: 'Helm chart for JHipster Online on Red Hat OpenShift (application
      2.41.1). Main pod runs JHipster 9 (Quarkus / Spring Boot via image tag) with
      optional JHipster 8 HTTP worker for stacks that still use JH8 blueprints (.NET,
      Node/NestJS, Azure Container Apps). When jhipster8Worker.enabled, a second Deployment
      + ClusterIP Service exposes generator-jhipster@8.11; the main app delegates
      via APPLICATION_JHIPSTER8WORKER_* env vars. Optional pyhipsterWorker (on by
      default) adds a PyHipster HTTP worker on port 8082 with APPLICATION_PYHIPSTERWORKER_*;
      set enabled false to disable. Optional mcpWorker (on by default) adds a Node
      MCP HTTP worker on port 8083 with APPLICATION_MCPWORKER_*; set enabled false
      to disable. Includes JDL Studio sidecar, optional in-cluster MariaDB (`mariadb.enabled`,
      default true), OpenShift Route, optional in-cluster deploy RBAC, and JDL AI.
      Runtime images on Quay (2.41.1-quarkus / 2.41.1-spring-boot): UBI8 OpenJDK 21,
      Node 22.19, Maven 3.9.15, WAR at /deployments/jhonline.war. Default values target
      Red Hat Developer Sandbox.'
