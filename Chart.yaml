apiVersion: v2
name: jhipster-online
description: >-
  Helm chart for JHipster Online on Red Hat OpenShift (application 2.40.1). Includes
  generator-jhipster 9.0.0, generator-jhipster-quarkus 3.6.0, a JDL Studio sidecar,
  MariaDB, an OpenShift Route, and optional in-cluster deploy RBAC. Runtime images on
  Quay (tags 2.40.1-quarkus / 2.40.1-spring-boot) match upstream Dockerfiles: UBI8
  OpenJDK 21, Node 22.19, Maven 3.9.15, WAR at /deployments/jhonline.war; the main
  container uses imagePullPolicy Always. JDL AI supports lexical and optional semantic
  RAG plus configurable HTTP timeouts. Defaults add JAVA_OPTS_APPEND (UTF-8 and
  MaxRAMPercentage for cgroup-friendly heap) and pod CPU/memory requests and limits.
  OpenShift generator templates are bundled in the app (no OPENSHIFT_* raw URL env vars).
  Aligns with upstream application-prod: optional chart-repo packaging after generate,
  and OpenShift deploy via Helm CLI with Fabric8 fallback.
  Default values.yaml targets Red Hat Developer Sandbox (Route, edit RBAC, in-cluster deploy, shared-model JDL AI URLs).
  Helm deploy tuning uses OPENSHIFT_USE_HELM_CLI / OPENSHIFT_HELM_* env names per upstream application-prod.yml.

# OpenShift 4.12+ ships Kubernetes 1.25; Developer Sandbox and current OCP are well above this floor.
kubeVersion: ">=1.25.0-0"

# A chart can be either an 'application' or a 'library' chart.
#
# Application charts are a collection of templates that can be packaged into versioned archives
# to be deployed.
#
# Library charts provide useful utilities or functions for the chart developer. They're included as
# a dependency of application charts to inject those utilities and functions into the rendering
# pipeline. Library charts do not define any templates and therefore cannot be deployed.
type: application

sources:
  - https://github.com/maximilianoPizarro/jhipster-online-helm-chart
  - https://github.com/redhat-developer-demos/jhipster-online

keywords:
  - jhipster
  - spring
  - openshift
  - quarkus
  - jdl-ai
  - vllm

# This is the chart version. This version number should be incremented each time you make changes
# to the chart and its templates, including the app version.
# Versions are expected to follow Semantic Versioning (https://semver.org/)
version: 1.1.0

# This is the version number of the application being deployed. This version number should be
# incremented each time you make changes to the application. Versions are not expected to
# follow Semantic Versioning. They should reflect the version the application is using.
# It is recommended to use it with quotes.
appVersion: "2.40.1"

home: https://maximilianopizarro.github.io/jhipster-online-helm-chart/

maintainers: # (optional)
  - name: Maximiliano Pizarro
    email: maximiliano.pizarro.5@gmail.com
    url: http://www.linkedin.com/in/maximiliano-gregorio-pizarro-consultor-it

icon: https://raw.githubusercontent.com/maximilianoPizarro/jhipster-online-helm-chart/main/rethat-jhipster.png

