{{- if .Values.jhipster8Worker.enabled }}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jhipster-online.fullname" . }}-jhipster8-worker
  labels:
    {{- include "jhipster-online.labels" . | nindent 4 }}
    app.kubernetes.io/component: jhipster8-worker
spec:
  replicas: {{ .Values.jhipster8Worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "jhipster-online.name" . }}
      app.kubernetes.io/instance: {{ .Release.Name }}
      app.kubernetes.io/component: jhipster8-worker
  template:
    metadata:
      labels:
        {{- include "jhipster-online.labels" . | nindent 8 }}
        app.kubernetes.io/component: jhipster8-worker
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jhipster-online.serviceAccountName" . }}
      containers:
        - name: jhipster8-worker
          image: "{{ .Values.jhipster8Worker.image.repository }}:{{ .Values.jhipster8Worker.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: {{ .Values.jhipster8Worker.port }}
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
{{- end }}
