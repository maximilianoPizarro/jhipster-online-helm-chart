apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "jhipster-online.fullname" . }}
  labels:
    {{- include "jhipster-online.labels" . | nindent 4 }}
  {{- if .Values.mariadb.enabled }}
  annotations:
    app.openshift.io/connects-to: '[{"apiVersion":"apps/v1","kind":"Deployment","name":"mariadb"}]'
  {{- end }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ .Chart.Name }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "jhipster-online.labels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "jhipster-online.serviceAccountName" . }}
      {{- with .Values.podSecurityContext }}
      securityContext:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      volumes:
        - name: nginx-conf-jh-volume
          configMap:
            name: nginx-conf
            defaultMode: 420
        {{- with .Values.volumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      containers:
        - name: {{ .Chart.Name }}
          {{- with .Values.securityContext }}
          securityContext:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
          {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
          {{- end }}
            - name: KUBERNETES_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
          {{- if .Values.jhipster8Worker.enabled }}
            - name: APPLICATION_JHIPSTER8WORKER_ENABLED
              value: "true"
            - name: APPLICATION_JHIPSTER8WORKER_BASE_URL
              value: {{ printf "http://%s-jhipster8-worker:%v" (include "jhipster-online.fullname" .) (.Values.jhipster8Worker.port | int) | quote }}
            - name: APPLICATION_JHIPSTER8WORKER_TIMEOUT_SECONDS
              value: "{{ .Values.jhipster8Worker.timeoutSeconds }}"
          {{- end }}
          {{- if .Values.pyhipsterWorker.enabled }}
            - name: APPLICATION_PYHIPSTERWORKER_ENABLED
              value: "true"
            - name: APPLICATION_PYHIPSTERWORKER_BASE_URL
              value: {{ printf "http://%s-pyhipster-worker:%v" (include "jhipster-online.fullname" .) (.Values.pyhipsterWorker.port | int) | quote }}
            - name: APPLICATION_PYHIPSTERWORKER_TIMEOUT_SECONDS
              value: "{{ .Values.pyhipsterWorker.timeoutSeconds }}"
          {{- end }}
          {{- if .Values.mcpWorker.enabled }}
            - name: APPLICATION_MCPWORKER_ENABLED
              value: "true"
            - name: APPLICATION_MCPWORKER_BASE_URL
              value: {{ printf "http://%s-mcp-worker:%v" (include "jhipster-online.fullname" .) (.Values.mcpWorker.port | int) | quote }}
            - name: APPLICATION_MCPWORKER_TIMEOUT_SECONDS
              value: "{{ .Values.mcpWorker.timeoutSeconds }}"
          {{- end }}
          ports:
            - name: jhipster-online
              containerPort: {{ .Values.service.port }}
              protocol: TCP
          {{- with .Values.startupProbe }}
          startupProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.resources }}
          resources:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.volumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
        - name: jdl-studio
          image: quay.io/maximilianopizarro/jdl-studio
          ports:
            - name: jdl-studio
              containerPort: 8081
              protocol: TCP
          {{- with .Values.jdlStudio.livenessProbe }}
          livenessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          {{- with .Values.jdlStudio.readinessProbe }}
          readinessProbe:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          volumeMounts:
            - name: nginx-conf-jh-volume
              mountPath: /opt/app-root/etc/nginx.default.d/default.conf
              subPath: default.conf  
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
